<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="frame-fab favicon">
  <title>frame-fab</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a5b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#7209b7"/>
    </linearGradient>
  </defs>

  <!-- 圆角深空背景（足够大，保证 16×16 像素下也清晰） -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- 倾斜胶片条（favicon 简化版：去掉 perforations,加粗中心元素） -->
  <g transform="rotate(-22 32 32)">
    <rect x="4" y="26" width="56" height="12" fill="url(#filmGrad)" opacity="0.95"/>
  </g>

  <!-- 中央暗盘（更大,占据更多视觉中心） -->
  <circle cx="32" cy="32" r="16" fill="#0a0e27" opacity="0.95"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="url(#aiGrad)" stroke-width="1.2" opacity="0.9"/>

  <!-- 播放三角（放大,小像素下仍可见） -->
  <path d="M 28 25 L 40 32 L 28 39 Z" fill="url(#aiGrad)"/>
</svg>
