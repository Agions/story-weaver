  <g transform="translate(820 80)">
    <!-- 大边框 (深底 + 边框, 强化品牌色) -->
    <rect x="0" y="0" width="380" height="380" rx="80" fill="url(#ogIconBg)" stroke="#A855F7" stroke-opacity="0.3" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="380" rx="80" fill="url(#ogPulseGlow)" opacity="0.25"/>

    <!-- 按 1.3 缩放绘制 256 视框图标 -->
