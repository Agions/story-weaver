<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="frame-fab social card">
  <title>frame-fab · AI 漫剧创作平台</title>
  <desc>GitHub social card / Open Graph share card 1280×640 (v2.2.3 patch版)</desc>
  <defs>
    <linearGradient id="ogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E2C"/>
      <stop offset="50%" stop-color="#14163B"/>
      <stop offset="100%" stop-color="#1F1A45"/>
    </linearGradient>
    <radialGradient id="ogGlowA" cx="80%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#A855F7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlowB" cx="15%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogGlowC" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F43F5E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="ogAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="ogText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <radialGradient id="ogPulseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#A855F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ogIconBg" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#1A1B3E"/>
      <stop offset="100%" stop-color="#0B0E2C"/>
    </radialGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="1280" height="640" fill="url(#ogBg)"/>
  <rect width="1280" height="640" fill="url(#ogGlowA)"/>
  <rect width="1280" height="640" fill="url(#ogGlowB)"/>
  <!-- 中心能量光 -->
  <rect width="1280" height="640" fill="url(#ogGlowC)"/>

  <!-- 顶部 + 底部胶片条带 (满宽双线) -->
  <g opacity="0.18">
    <rect x="0" y="80"  width="1280" height="2" fill="url(#ogPrimary)"/>
    <rect x="0" y="560" width="1280" height="2" fill="url(#ogPrimary)"/>
    <!-- 胶片孔点 (顶) -->
    <g fill="#EC4899" opacity="0.6">
      <rect x="40"   y="68" width="10" height="10" rx="2"/>
      <rect x="110"  y="68" width="10" height="10" rx="2"/>
      <rect x="180"  y="68" width="10" height="10" rx="2"/>
      <rect x="250"  y="68" width="10" height="10" rx="2"/>
      <rect x="320"  y="68" width="10" height="10" rx="2"/>
      <rect x="390"  y="68" width="10" height="10" rx="2"/>
      <rect x="460"  y="68" width="10" height="10" rx="2"/>
      <rect x="530"  y="68" width="10" height="10" rx="2"/>
      <rect x="600"  y="68" width="10" height="10" rx="2"/>
      <rect x="670"  y="68" width="10" height="10" rx="2"/>
      <rect x="740"  y="68" width="10" height="10" rx="2"/>
      <rect x="810"  y="68" width="10" height="10" rx="2"/>
      <rect x="880"  y="68" width="10" height="10" rx="2"/>
      <rect x="950"  y="68" width="10" height="10" rx="2"/>
      <rect x="1020" y="68" width="10" height="10" rx="2"/>
      <rect x="1090" y="68" width="10" height="10" rx="2"/>
      <rect x="1160" y="68" width="10" height="10" rx="2"/>
      <rect x="1230" y="68" width="10" height="10" rx="2"/>
    </g>
    <!-- 胶片孔点 (底) -->
    <g fill="#EC4899" opacity="0.6">
      <rect x="40"   y="562" width="10" height="10" rx="2"/>
      <rect x="110"  y="562" width="10" height="10" rx="2"/>
      <rect x="180"  y="562" width="10" height="10" rx="2"/>
      <rect x="250"  y="562" width="10" height="10" rx="2"/>
      <rect x="320"  y="562" width="10" height="10" rx="2"/>
      <rect x="390"  y="562" width="10" height="10" rx="2"/>
      <rect x="460"  y="562" width="10" height="10" rx="2"/>
      <rect x="530"  y="562" width="10" height="10" rx="2"/>
      <rect x="600"  y="562" width="10" height="10" rx="2"/>
      <rect x="670"  y="562" width="10" height="10" rx="2"/>
      <rect x="740"  y="562" width="10" height="10" rx="2"/>
      <rect x="810"  y="562" width="10" height="10" rx="2"/>
      <rect x="880"  y="562" width="10" height="10" rx="2"/>
      <rect x="950"  y="562" width="10" height="10" rx="2"/>
      <rect x="1020" y="562" width="10" height="10" rx="2"/>
      <rect x="1090" y="562" width="10" height="10" rx="2"/>
      <rect x="1160" y="562" width="10" height="10" rx="2"/>
      <rect x="1230" y="562" width="10" height="10" rx="2"/>
    </g>
  </g>

  <!-- 左侧文字信息 -->
  <g transform="translate(80 0)">
    <text y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="6" fill="#A5B4FC">v2.2.3 · OPEN SOURCE · MIT LICENSE</text>

    <!-- 主标题 (大字号, 渐变) -->
    <text y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="108" font-weight="800" letter-spacing="-4">
      <tspan fill="url(#ogText)">frame</tspan><tspan fill="#A5B4FC">·</tspan><tspan fill="url(#ogText)">fab</tspan>
    </text>

    <!-- 中文副标 -->
    <text y="350" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="600" letter-spacing="2" fill="#C5CAE9">AI 漫剧创作平台</text>
    <!-- 英文副标 -->
    <text y="394" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" letter-spacing="2" fill="#9CA3B8">Novel-to-Video AI Pipeline · v2.2.3</text>

    <!-- 特性徽章 (4 个 v2.2.3 关键能力) -->
    <g transform="translate(0 432)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600">
      <g>
        <rect x="0" y="0" width="138" height="34" rx="17" fill="#6366F1" fill-opacity="0.18" stroke="#6366F1" stroke-opacity="0.6"/>
        <text x="69" y="22" font-size="14" fill="#C7D2FE" text-anchor="middle" letter-spacing="1">TAURI 2 · RUST</text>
      </g>
      <g transform="translate(150 0)">
        <rect x="0" y="0" width="158" height="34" rx="17" fill="#A855F7" fill-opacity="0.18" stroke="#A855F7" stroke-opacity="0.6"/>
        <text x="79" y="22" font-size="14" fill="#D8B4FE" text-anchor="middle" letter-spacing="1">7+ AI MODELS</text>
      </g>
      <g transform="translate(322 0)">
        <rect x="0" y="0" width="172" height="34" rx="17" fill="#EC4899" fill-opacity="0.18" stroke="#EC4899" stroke-opacity="0.6"/>
        <text x="86" y="22" font-size="14" fill="#F9A8D4" text-anchor="middle" letter-spacing="1">QUALITY GATE</text>
      </g>
      <g transform="translate(508 0)">
        <rect x="0" y="0" width="172" height="34" rx="17" fill="#F43F5E" fill-opacity="0.18" stroke="#F43F5E" stroke-opacity="0.6"/>
        <text x="86" y="22" font-size="14" fill="#FDA4AF" text-anchor="middle" letter-spacing="1">10-STEP PIPELINE</text>
      </g>
    </g>
  </g>

