      <!-- 神经网络连接 -->
      <g opacity="0.5">
        <line x1="40" y1="40" x2="100" y2="100" stroke="url(#ogPrimary)" stroke-width="1.5"/>
        <line x1="216" y1="40" x2="156" y2="100" stroke="url(#ogPrimary)" stroke-width="1.5"/>
        <line x1="40" y1="216" x2="100" y2="156" stroke="url(#ogPrimary)" stroke-width="1.5"/>
        <line x1="216" y1="216" x2="156" y2="156" stroke="url(#ogPrimary)" stroke-width="1.5"/>
        <circle cx="40"  cy="40"  r="3" fill="#A855F7" opacity="0.8"/>
        <circle cx="216" cy="40"  r="3" fill="#A855F7" opacity="0.8"/>
        <circle cx="40"  cy="216" r="3" fill="#A855F7" opacity="0.8"/>
        <circle cx="216" cy="216" r="3" fill="#A855F7" opacity="0.8"/>
      </g>
      <!-- 5 帧胶片 -->
