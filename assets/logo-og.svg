      <rect x="50"  y="68"  width="46" height="120" rx="9" fill="none" stroke="url(#ogPrimary)" stroke-width="4.5"/>
      <rect x="105" y="54"  width="46" height="148" rx="9" fill="none" stroke="url(#ogPrimary)" stroke-width="5.5"/>
      <rect x="160" y="68"  width="46" height="120" rx="9" fill="none" stroke="url(#ogPrimary)" stroke-width="4.5"/>
      <rect x="202" y="84"  width="40" height="88"  rx="8" fill="none" stroke="url(#ogPrimary)" stroke-width="3.5" opacity="0.4"/>
      <!-- 胶片孔 -->
      <g fill="#EC4899" opacity="0.8">
        <rect x="58"  y="78"  width="5" height="5" rx="1.5"/>
        <rect x="78"  y="78"  width="5" height="5" rx="1.5"/>
        <rect x="113" y="64"  width="5" height="5" rx="1.5"/>
        <rect x="133" y="64"  width="5" height="5" rx="1.5"/>
        <rect x="168" y="78"  width="5" height="5" rx="1.5"/>
        <rect x="188" y="78"  width="5" height="5" rx="1.5"/>
        <rect x="58"  y="173" width="5" height="5" rx="1.5"/>
        <rect x="78"  y="173" width="5" height="5" rx="1.5"/>
        <rect x="113" y="187" width="5" height="5" rx="1.5"/>
        <rect x="133" y="187" width="5" height="5" rx="1.5"/>
        <rect x="168" y="173" width="5" height="5" rx="1.5"/>
        <rect x="188" y="173" width="5" height="5" rx="1.5"/>
      </g>
      <!-- 中心光圈 -->
      <g transform="translate(128 128)">
        <circle r="48" fill="url(#ogPulseGlow)" opacity="0.6"/>
        <circle r="20" fill="url(#ogAccent)"/>
        <circle r="13" fill="url(#ogPrimary)"/>
        <circle r="5"  fill="#FFFFFF"/>
        <circle r="2"  fill="#A855F7"/>
        <g stroke="url(#ogPrimary)" stroke-width="3.5" stroke-linecap="round" opacity="0.9">
          <line x1="-62" y1="0"   x2="-28" y2="0"/>
          <line x1="28"  y1="0"   x2="62"  y2="0"/>
          <line x1="0"   y1="-62" x2="0"  y2="-28"/>
          <line x1="0"   y1="28"  x2="0"   y2="62"/>
        </g>
        <g fill="#EC4899" opacity="0.9">
          <circle cx="-68" cy="0"   r="2.2"/>
          <circle cx="68"  cy="0"   r="2.2"/>
          <circle cx="0"   cy="-68" r="2.2"/>
          <circle cx="0"   cy="68"  r="2.2"/>
        </g>
      </g>
    </g>
  </g>

  <!-- 底部信息 -->
  <g transform="translate(80 612)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9CA3B8">github.com/Agions/frame-fab</text>
  </g>
  <g transform="translate(1200 612)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9CA3B8" text-anchor="end">v2.2.3 · 2026</text>
  </g>
