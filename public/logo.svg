<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Story Weaver">
  <title>Story Weaver</title>
  <desc>AI 漫剧创作平台 — 编织故事的概念标志</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="g2" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0B0E2C"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="56" fill="url(#g2)"/>

  <!-- 编织经纬线: 三条经线 + 三条纬线交织 -->
  <g stroke="url(#g1)" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <!-- 经线 (纵向弧线) -->
    <path d="M 70 30 Q 55 128 70 226" fill="none"/>
    <path d="M 128 30 Q 128 128 128 226" fill="none"/>
    <path d="M 186 30 Q 201 128 186 226" fill="none"/>
    <!-- 纬线 (横向弧线) -->
    <path d="M 30 70 Q 128 55 226 70" fill="none" opacity="0.4"/>
    <path d="M 30 128 Q 128 128 226 128" fill="none" opacity="0.4"/>
  </g>

  <!-- 节点 (经线交点): 代表漫剧画面 -->
  <g fill="url(#g1)">
    <rect x="62" y="62" width="16" height="16" rx="4"/>
    <rect x="120" y="62" width="16" height="16" rx="4"/>
    <rect x="178" y="62" width="16" height="16" rx="4"/>
    <rect x="62" y="120" width="16" height="16" rx="4"/>
    <rect x="120" y="120" width="16" height="16" rx="4" opacity="0.7"/>
    <rect x="178" y="120" width="16" height="16" rx="4"/>
  </g>

  <!-- 中心光点 (故事汇聚) -->
  <g transform="translate(128 128)">
    <circle r="20" fill="url(#g1)" opacity="0.2"/>
    <circle r="10" fill="url(#g1)"/>
    <circle r="4" fill="#FFFFFF"/>
  </g>

  <!-- 四角装饰 -->
  <circle cx="40" cy="40" r="2" fill="#A855F7" opacity="0.5"/>
  <circle cx="216" cy="40" r="2" fill="#A855F7" opacity="0.5"/>
  <circle cx="40" cy="216" r="2" fill="#A855F7" opacity="0.5"/>
  <circle cx="216" cy="216" r="2" fill="#A855F7" opacity="0.5"/>
</svg>
