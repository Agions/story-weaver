<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7C59F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#45B8AC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89D8D0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e"/>
  
  <!-- Panel 1 (top-left) -->
  <rect x="20" y="20" width="40" height="35" rx="4" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Panel 2 (top-right) -->
  <rect x="68" y="20" width="40" height="35" rx="4" fill="url(#grad2)" opacity="0.9"/>
  
  <!-- Panel 3 (bottom-left) -->
  <rect x="20" y="63" width="40" height="45" rx="4" fill="url(#grad2)" opacity="0.9"/>
  
  <!-- Panel 4 (bottom-right) -->
  <rect x="68" y="63" width="40" height="45" rx="4" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Flow lines connecting panels -->
  <path d="M60 37 Q 64 37, 68 37" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M60 85 Q 64 85, 68 85" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M37 55 Q 37 59, 37 63" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M91 55 Q 91 59, 91 63" stroke="#fff" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Play triangle in center -->
  <polygon points="58,52 58,76 76,64" fill="#fff" opacity="0.95"/>
</svg>
