<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Story Weaver">
  <title>Story Weaver · AI 漫剧创作平台</title>
  <defs>
    <linearGradient id="og1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0E2C"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="og2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="og3" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="640" fill="url(#og1)"/>
  <rect width="1280" height="640" fill="url(#og3)"/>

  <!-- 左侧文字 -->
  <g transform="translate(80 0)">
    <text y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="#A5B4FC">v2.2.3 · OPEN SOURCE · MIT</text>
    <text y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="-4" fill="url(#ogText)">Story<tspan fill="#A5B4FC"> · </tspan>Weaver</text>
    <text y="360" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="600" letter-spacing="2" fill="#C5CAE9">AI 漫剧创作平台</text>
    <text y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" letter-spacing="2" fill="#9CA3B8">Novel-to-Comic Drama · AI Pipeline</text>

    <!-- 特性徽章 -->
    <g transform="translate(0 440)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600">
      <rect width="130" height="36" rx="18" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-opacity="0.5"/>
      <text x="65" y="23" font-size="13" fill="#C7D2FE" text-anchor="middle">TAURI · RUST</text>
      <g transform="translate(144 0)">
        <rect width="150" height="36" rx="18" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.5"/>
        <text x="75" y="23" font-size="13" fill="#D8B4FE" text-anchor="middle">7+ AI MODELS</text>
      </g>
      <g transform="translate(308 0)">
        <rect width="160" height="36" rx="18" fill="#EC4899" fill-opacity="0.15" stroke="#EC4899" stroke-opacity="0.5"/>
        <text x="80" y="23" font-size="13" fill="#F9A8D4" text-anchor="middle">QUALITY GATE</text>
      </g>
      <g transform="translate(482 0)">
        <rect width="165" height="36" rx="18" fill="#F43F5E" fill-opacity="0.15" stroke="#F43F5E" stroke-opacity="0.5"/>
        <text x="82" y="23" font-size="13" fill="#FDA4AF" text-anchor="middle">10-STEP PIPELINE</text>
      </g>
    </g>
  </g>

  <!-- 右侧大图标 -->
  <g transform="translate(820 100)">
    <rect width="380" height="380" rx="80" fill="#0B0E2C" stroke="#A855F7" stroke-opacity="0.25" stroke-width="2"/>
    <g transform="translate(60 60) scale(1.1)">
      <g stroke="url(#og2)" stroke-width="4" stroke-linecap="round" opacity="0.6">
        <path d="M 30 10 Q 20 80 30 150" fill="none"/>
        <path d="M 80 10 Q 80 80 80 150" fill="none"/>
        <path d="M 130 10 Q 140 80 130 150" fill="none"/>
        <path d="M 10 30 Q 80 20 150 30" fill="none" opacity="0.4"/>
        <path d="M 10 80 Q 80 80 150 80" fill="none" opacity="0.4"/>
      </g>
      <g fill="url(#og2)">
        <rect x="22" y="22" width="16" height="16" rx="4"/>
        <rect x="72" y="22" width="16" height="16" rx="4"/>
        <rect x="122" y="22" width="16" height="16" rx="4"/>
        <rect x="22" y="72" width="16" height="16" rx="4"/>
        <rect x="72" y="72" width="16" height="16" rx="4" opacity="0.6"/>
        <rect x="122" y="72" width="16" height="16" rx="4"/>
      </g>
      <g transform="translate(80 110)">
        <circle r="22" fill="url(#og2)" opacity="0.2"/>
        <circle r="11" fill="url(#og2)"/>
        <circle r="4" fill="#FFFFFF"/>
      </g>
    </g>
  </g>

  <!-- 底部 -->
  <text x="80" y="615" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#6B7280">github.com/Agions/story-weaver</text>
  <text x="1200" y="615" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#6B7280" text-anchor="end">v2.2.3 · 2026</text>
</svg>
