    <g opacity="0.55">
      <line x1="40" y1="40" x2="100" y2="100" stroke="url(#brandPrimaryH)" stroke-width="1.2" opacity="0.55"/>
      <line x1="216" y1="40" x2="156" y2="100" stroke="url(#brandPrimaryH)" stroke-width="1.2" opacity="0.55"/>
      <line x1="40" y1="216" x2="100" y2="156" stroke="url(#brandPrimaryH)" stroke-width="1.2" opacity="0.55"/>
      <line x1="216" y1="216" x2="156" y2="156" stroke="url(#brandPrimaryH)" stroke-width="1.2" opacity="0.55"/>
      <circle cx="40"  cy="40"  r="2" fill="#A855F7" opacity="0.7"/>
      <circle cx="216" cy="40"  r="2" fill="#A855F7" opacity="0.7"/>
      <circle cx="40"  cy="216" r="2" fill="#A855F7" opacity="0.7"/>
      <circle cx="216" cy="216" r="2" fill="#A855F7" opacity="0.7"/>
    </g>
    <rect x="14"  y="84" width="40" height="88" rx="8" fill="none" stroke="url(#brandPrimaryH)" stroke-width="3" opacity="0.35"/>
    <rect x="50"  y="68" width="46" height="120" rx="9" fill="none" stroke="url(#brandPrimaryH)" stroke-width="4"/>
    <rect x="105" y="54" width="46" height="148" rx="9" fill="none" stroke="url(#brandPrimaryH)" stroke-width="5"/>
    <rect x="160" y="68" width="46" height="120" rx="9" fill="none" stroke="url(#brandPrimaryH)" stroke-width="4"/>
    <rect x="202" y="84" width="40" height="88" rx="8" fill="none" stroke="url(#brandPrimaryH)" stroke-width="3" opacity="0.35"/>
    <g fill="#EC4899" opacity="0.78">
      <rect x="58"  y="78"  width="5" height="5" rx="1.5"/>
      <rect x="78"  y="78"  width="5" height="5" rx="1.5"/>
      <rect x="113" y="64"  width="5" height="5" rx="1.5"/>
      <rect x="133" y="64"  width="5" height="5" rx="1.5"/>
      <rect x="168" y="78"  width="5" height="5" rx="1.5"/>
      <rect x="188" y="78"  width="5" height="5" rx="1.5"/>
    </g>
    <g fill="#EC4899" opacity="0.78">
      <rect x="58"  y="173" width="5" height="5" rx="1.5"/>
      <rect x="78"  y="173" width="5" height="5" rx="1.5"/>
      <rect x="113" y="187" width="5" height="5" rx="1.5"/>
      <rect x="133" y="187" width="5" height="5" rx="1.5"/>
      <rect x="168" y="173" width="5" height="5" rx="1.5"/>
      <rect x="188" y="173" width="5" height="5" rx="1.5"/>
    </g>
