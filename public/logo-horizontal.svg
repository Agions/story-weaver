<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="Story Weaver">
  <title>Story Weaver</title>
  <defs>
    <linearGradient id="h1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="h2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- 左侧图标 -->
  <g transform="translate(20 20) scale(0.625)">
    <rect width="256" height="256" rx="56" fill="#0B0E2C"/>
    <g stroke="url(#h1)" stroke-width="3" stroke-linecap="round" opacity="0.6">
      <path d="M 70 30 Q 55 128 70 226" fill="none"/>
      <path d="M 128 30 Q 128 128 128 226" fill="none"/>
      <path d="M 186 30 Q 201 128 186 226" fill="none"/>
      <path d="M 30 70 Q 128 55 226 70" fill="none" opacity="0.4"/>
      <path d="M 30 128 Q 128 128 226 128" fill="none" opacity="0.4"/>
    </g>
    <g fill="url(#h1)">
      <rect x="62" y="62" width="16" height="16" rx="4"/>
      <rect x="120" y="62" width="16" height="16" rx="4"/>
      <rect x="178" y="62" width="16" height="16" rx="4"/>
      <rect x="62" y="120" width="16" height="16" rx="4"/>
      <rect x="120" y="120" width="16" height="16" rx="4" opacity="0.7"/>
      <rect x="178" y="120" width="16" height="16" rx="4"/>
    </g>
    <g transform="translate(128 128)">
      <circle r="20" fill="url(#h1)" opacity="0.2"/>
      <circle r="10" fill="url(#h1)"/>
      <circle r="4" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- 右侧文字 -->
  <g transform="translate(208 0)">
    <text x="0" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="url(#h2)">Story Weaver</text>
    <text x="2" y="140" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="1" fill="#0B0E2C">AI 漫剧创作平台</text>
    <text x="2" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#6B7280">NOVEL · TO · COMIC · DRAMA</text>
  </g>
