<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="frame-fab — AI Manju Studio">
  <title>frame-fab</title>
  <desc>frame-fab 水平 logo: 图标 + 渐变文字 + 副标 (v2.2.3 patch版)</desc>
  <defs>
    <linearGradient id="brandPrimaryH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="brandAccentH" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="textGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <radialGradient id="pulseGlowH" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#A855F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowH" cx="50%" cy="48%" r="62%">
      <stop offset="0%" stop-color="#1A1B3E"/>
      <stop offset="100%" stop-color="#0B0E2C"/>
    </radialGradient>
  </defs>

  <!-- 左侧图标 (复用 v2.2.3 patch) -->
  <g transform="translate(20 20) scale(0.625)">
