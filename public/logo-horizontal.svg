  <!-- 右侧文字 (中英文双语) -->
  <g transform="translate(208 0)">
    <text x="0" y="96" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2.5">
      <tspan fill="url(#textGradH)">frame</tspan><tspan fill="#0B0E2C">·</tspan><tspan fill="#0B0E2C">fab</tspan>
    </text>
    <text x="0" y="138" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="2" fill="#0B0E2C">AI 漫剧创作平台</text>
    <text x="0" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3" fill="#6B7280">NOVEL · TO · VIDEO · AI · PIPELINE</text>
