name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # All jobs run in parallel — no sequential dependency
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint -- --quiet

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test -- --runInBand --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build:check

  # ============================================================
  # Final gate — waits for all parallel jobs
  # ============================================================
  check:
    name: Final Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, type-check, unit-test, build-check]

    steps:
      - name: All checks passed
        run: echo "✅ All checks passed"
