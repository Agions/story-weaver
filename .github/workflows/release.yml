name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Update tauri.conf.json version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          grep '"version"' src-tauri/tauri.conf.json

      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src-tauri/tauri.conf.json
          git commit -m "chore(release): sync version to ${{ steps.version.outputs.version }}" || true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: |
            ## Download Story Weaver ${{ steps.version.outputs.version }}

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | Windows | x64 | [.zip](story-weaver-${{ steps.version.outputs.version }}-windows-x64.zip) |
            | Windows | ARM64 | [.zip](story-weaver-${{ steps.version.outputs.version }}-windows-arm64.zip) |
            | macOS | Universal | [.tar.gz](story-weaver-${{ steps.version.outputs.version }}-macos-universal.tar.gz) |
            | Linux | x64 | [.tar.gz](story-weaver-${{ steps.version.outputs.version }}-linux-x64.tar.gz) |

            > Full release notes: [CHANGELOG.md](https://github.com/Agions/story-weaver/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md)
          draft: true
          prerelease: ${{ contains(steps.version.outputs.tag, 'alpha') || contains(steps.version.outputs.tag, 'beta') || contains(steps.version.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-x64:
    name: Build Windows x64
    needs: prepare
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri (Windows x64)
        run: pnpm run tauri build --target x86_64-pc-windows-msvc || true

      - name: Package as zip
        id: package
        shell: pwsh
        run: |
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $exe = "story-weaver.exe"
          $out = "story-weaver-${{ needs.prepare.outputs.version }}-windows-x64.zip"
          Compress-Archive -Path "$src/$exe", "$src/*.dll" -DestinationPath $out -Force
          echo "artifact_name=$out" >> $env:GITHUB_OUTPUT

      - name: Upload Windows x64 zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: story-weaver-${{ needs.prepare.outputs.version }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-arm64:
    name: Build Windows ARM64
    needs: prepare
    runs-on: windows-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri (Windows ARM64)
        run: pnpm run tauri build --target aarch64-pc-windows-msvc || true

      - name: Package as zip
        id: package
        shell: pwsh
        run: |
          $src = "src-tauri/target/aarch64-pc-windows-msvc/release"
          $exe = "story-weaver.exe"
          $out = "story-weaver-${{ needs.prepare.outputs.version }}-windows-arm64.zip"
          Compress-Archive -Path "$src/$exe", "$src/*.dll" -DestinationPath $out -Force
          echo "artifact_name=$out" >> $env:GITHUB_OUTPUT

      - name: Upload Windows ARM64 zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: story-weaver-${{ needs.prepare.outputs.version }}-windows-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    needs: prepare
    runs-on: macos-latest
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri Universal (x64 + ARM64)
        run: pnpm run tauri build

      - name: Package as tar.gz
        id: package
        run: |
          cd $GITHUB_WORKSPACE/src-tauri/target/release/bundle
          tar -czf "$GITHUB_WORKSPACE/story-weaver-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz" -C macos story-weaver.app
          echo "artifact_name=story-weaver-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload macOS tar.gz
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: story-weaver-${{ needs.prepare.outputs.version }}-macos-universal.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: prepare
    runs-on: ubuntu-22.04
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Tauri (Linux)
        run: pnpm run tauri build

      - name: Package as tar.gz
        id: package
        run: |
          cd src-tauri/target/release
          tar -czf "$GITHUB_WORKSPACE/story-weaver-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" story-weaver
          echo "artifact_name=story-weaver-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz" >> $GITHUB_OUTPUT

      - name: Upload Linux tar.gz
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: true
          files: story-weaver-${{ needs.prepare.outputs.version }}-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    name: Publish Release
    needs: [prepare, build-windows-x64, build-windows-arm64, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
