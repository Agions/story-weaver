name: Bug Report
description: Report a bug in FrameForge
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe the bug in detail
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens

  - type: input
    id: version
    attributes:
      label: FrameForge Version
      placeholder: e.g., 3.0.0

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Web
        - All

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      placeholder: Paste any relevant logs here
