name: Feature Request
description: Suggest a new feature for frame-fab
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Have an idea for a new feature? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How would you solve this problem?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any alternative solutions you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Any other context or screenshots?
